<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Monitoring SKTH 2025</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

body{
background-color:#262c2e;
color:#ffffff;
font-family:'Inter',sans-serif;
margin:0;
padding:20px;
min-height:100vh;
}

.text-header{color:#ebdcc0;}

.bg-panel-1{background-color:#395c64;}
.bg-panel-3{background-color:#ebdcc0;}

.chart-container{
position:relative;
height:250px;
width:100%;
display:flex;
justify-content:center;
align-items:center;
}

</style>
</head>

<body class="flex flex-col gap-4">

<header>
<h1 class="text-3xl font-bold text-header">SKTH 2025</h1>
</header>

<main class="flex flex-col lg:flex-row gap-4 w-full" id="dashboard-content" style="display:none;">

<!-- BAR CHART (KIRI) -->
<section class="bg-panel-3 rounded shadow-lg p-4 lg:w-[70%] relative">

<div style="height:320px;width:100%;">
<canvas id="barChart"></canvas>
</div>

</section>


<!-- DONUT CHART (KANAN) -->
<section class="bg-panel-1 rounded shadow-lg p-6 flex flex-col items-center justify-center lg:w-[30%]">

<div class="chart-container">
<canvas id="donutChart"></canvas>
</div>

<div class="flex gap-6 mt-4 text-sm font-semibold">

<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full inline-block" style="background:#b66545;"></span>
Selesai
</div>

<div class="flex items-center gap-2">
<span class="w-3 h-3 rounded-full inline-block" style="background:#262c2e;"></span>
Belum
</div>

</div>

</section>

</main>


<div id="loading" class="text-center text-header text-xl mt-20">
Memuat Data...
</div>



<script>

const GOOGLE_SHEET_CSV_URL = "";

const mockDataCSV = `Kode,Wilayah,Target,Selesai
3306,Purworejo,100,35
3372,Kota Surakarta,100,29
3304,Banjarnegara,100,24
3302,Banyumas,100,16
3301,Cilacap,100,0
3303,Purbalingga,100,0
3305,Kebumen,100,0
3307,Wonosobo,100,0
3308,Magelang,100,0
3309,Boyolali,100,0
3310,Klaten,100,0
3311,Sukoharjo,100,0
3312,Wonogiri,100,0
3313,Karanganyar,100,0
3314,Sragen,100,0
3315,Grobogan,100,0
3316,Blora,100,0
3317,Rembang,100,0
3318,Pati,100,0
3319,Kudus,100,0
3320,Jepara,100,0
3321,Demak,100,0
3322,Semarang,100,0
3323,Temanggung,100,0
3324,Kendal,100,0
3325,Batang,100,0
3326,Pekalongan,100,0
3327,Pemalang,100,0
3328,Tegal,100,0
3329,Brebes,100,0
3371,Kota Magelang,100,0
3373,Kota Salatiga,100,0
3374,Kota Semarang,100,0
3375,Kota Pekalongan,100,0
3376,Kota Tegal,100,0`;


const colors={
selesaiDonut:'#b66545',
belumDonut:'#262c2e',
selesaiBar:'#395c64',
belumBar:'#b66545'
};


async function loadData(){

return new Promise(async(resolve)=>{

let csvString=mockDataCSV;

if(GOOGLE_SHEET_CSV_URL && GOOGLE_SHEET_CSV_URL.trim()!==""){

try{

const res=await fetch(GOOGLE_SHEET_CSV_URL);

if(res.ok){
csvString=await res.text();
}

}catch(e){}

}

Papa.parse(csvString,{
header:true,
dynamicTyping:true,
skipEmptyLines:true,
complete:function(results){

const data=results.data.filter(d=>d.Wilayah && d.Target);
resolve(data);

}
});

});

}



async function initDashboard(){

const data=await loadData();

document.getElementById('loading').style.display='none';
document.getElementById('dashboard-content').style.display='flex';


let totalTarget=0;
let totalSelesai=0;

data.forEach(d=>{
totalTarget+=d.Target;
totalSelesai+=d.Selesai;
});

let totalBelum=totalTarget-totalSelesai;



const ctxDonut=document.getElementById('donutChart').getContext('2d');

new Chart(ctxDonut,{
type:'doughnut',
data:{
labels:['Selesai','Belum'],
datasets:[{
data:[totalSelesai,totalBelum],
backgroundColor:[
colors.selesaiDonut,
colors.belumDonut
],
borderWidth:1,
borderColor:'#ebdcc0'
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
cutout:'70%',
plugins:{
legend:{display:false},
tooltip:{
callbacks:{
label:function(context){

let val=context.raw;
let pct=((val/totalTarget)*100).toFixed(1)+'%';

return context.label+': '+val+' ('+pct+')';

}
}
}
}
}
});



const labels=[];
const dataSelesaiPct=[];
const dataBelumPct=[];


const barData=[...data].sort((a,b)=>{

let pctA=a.Selesai/a.Target;
let pctB=b.Selesai/b.Target;

return pctB-pctA;

});


barData.forEach(d=>{

labels.push(d.Kode.toString());

let selesaiPct=(d.Selesai/d.Target)*100;
let belumPct=100-selesaiPct;

dataSelesaiPct.push(selesaiPct);
dataBelumPct.push(belumPct);

});



const ctxBar=document.getElementById('barChart').getContext('2d');

new Chart(ctxBar,{
type:'bar',
data:{
labels:labels,
datasets:[
{
label:'Selesai',
data:dataSelesaiPct,
backgroundColor:colors.selesaiBar,
barPercentage:0.6
},
{
label:'Belum',
data:dataBelumPct,
backgroundColor:colors.belumBar,
barPercentage:0.6
}
]
},
options:{
responsive:true,
maintainAspectRatio:false,
scales:{
x:{
stacked:true,
grid:{display:false},
ticks:{
maxRotation:45,
minRotation:45,
font:{size:10},
color:'#1f2937'
}
},
y:{
stacked:true,
max:100,
grid:{color:'rgba(0,0,0,0.1)'},
ticks:{
callback:function(value){
return value+'%'
},
color:'#1f2937'
}
}
},
plugins:{
legend:{
position:'bottom',
labels:{
color:'#1f2937',
usePointStyle:true,
boxWidth:10
}
},
tooltip:{
callbacks:{
label:function(context){
return context.dataset.label+': '+context.raw.toFixed(1)+'%';
}
}
}
}
}
});

}

window.addEventListener('DOMContentLoaded',initDashboard);

</script>

</body>
</html>
